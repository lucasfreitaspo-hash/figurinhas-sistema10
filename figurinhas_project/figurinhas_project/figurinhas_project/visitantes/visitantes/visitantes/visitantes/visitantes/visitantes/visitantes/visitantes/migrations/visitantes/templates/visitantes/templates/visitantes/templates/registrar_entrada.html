{% extends 'base.html' %}

{% block title %}Registrar Entrada - Mister Wiz{% endblock %}

{% block content %}
<div class="form-container">
    <h1>🎴 Novo Visitante</h1>
    
    {% if erro %}
        <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}

    <form method="POST" class="form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nome">Nome do Visitante *</label>
            <input type="text" id="nome" name="nome" required placeholder="Digite o nome completo">
        </div>

        <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" required placeholder="(XX) XXXXX-XXXX">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@exemplo.com">
        </div>

        <div class="form-group">
            <label for="tipo">Tipo de Visitante *</label>
            <select id="tipo" name="tipo" required>
                <option value="">Selecione...</option>
                <option value="comprador">🛒 Comprador</option>
                <option value="vendedor">💼 Vendedor</option>
                <option value="outro">📌 Outro</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Próximo: Registrar Venda ➔</button>
    </form>
</div>
{% endblock %}
